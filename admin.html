<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Kennedy Muthengi</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 5rem auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        input[type="text"],
        input[type="password"] {
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
        }
        
        .login-btn {
            background-color: var(--primary);
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .login-btn:hover {
            background-color: var(--primary-dark);
        }
        
        #admin-panel {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container" id="login-form">
        <h1>Admin Login</h1>
        <form class="login-form" onsubmit="event.preventDefault(); handleLogin()">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

    <div id="admin-panel">
        <!-- Existing admin content will go here -->
    </div>

    <script>
        // Handle login
        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/health', {
                    headers: {
                        'Authorization': 'Basic ' + btoa(username + ':' + password)
                    }
                });
                
                if (response.ok) {
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('admin-panel').style.display = 'block';
                    loadAdminContent();
                } else {
                    throw new Error('Login failed');
                }
            } catch (err) {
                alert('Invalid credentials');
                document.getElementById('password').value = '';
            }
        }

        // Load admin content after successful login
        function loadAdminContent() {
            // You can move the existing admin content here
            // or load it dynamically via AJAX
            document.getElementById('admin-panel').innerHTML = `
                <header role="banner">
                    <nav role="navigation" aria-label="Main navigation">
                        <div class="nav-container">
                            <a class="bio" href="index.html">Admin Panel</a>
                            <div class="nav-links">
                                <a href="index.html">View Site</a>
                                <button onclick="logout()">Logout</button>
                            </div>
                        </div>
                    </nav>
                </header>

                <main class="admin-content">
                    <!-- Rest of your admin content -->
                </main>
            `;
        }

        function logout() {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
