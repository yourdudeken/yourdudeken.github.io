<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Kennedy Muthengi</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header role="banner">
        <nav role="navigation" aria-label="Main navigation">
            <div class="nav-container">
                <a class="bio" href="index.html">Ken's Dev Blog</a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="blog.html">Blog</a>
                    <a href="about.html">About</a>
                    <a class="contact" href="contact.html" aria-current="page">Contact</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="contact-content">
        <div class="contact-container">
            <h1>Get In Touch</h1>
            <section>
                <h2>Contact Form</h2>
                <form id="contact-form" action="https://formspree.io/f/kenmwendwamuthengi@gmail.com" method="POST">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">Send Message</button>
                    <div id="form-status"></div>
                </form>
            </section>
        </div>
    </main>

    <footer role="contentinfo">
        <div class="footer-content">
            <div class="footer-section">
                <h3>Quick Links</h3>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html" aria-current="page">Contact</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3>Connect</h3>
                <div class="footer-social">
                    <a href="https://github.com/yourdudeken" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                        <img src="icons/github.png" alt="GitHub">
                    </a>
                    <a href="https://linkedin.com/in/yourdudeken" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                        <img src="icons/linkedin.png" alt="LinkedIn">
                    </a>
                </div>
            </div>
            <div class="footer-section">
                <h3>Contact Info</h3>
                <p>Nairobi, Kenya</p>
                <p>Email: kenmwendwamuthengi@gmail.com</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; <span id="year"></span> Kennedy Muthengi. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
